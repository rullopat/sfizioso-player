name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Ninja
        run: brew install ninja

      # Pin the WebView UI build runtime separately from the GitHub Action runtime.
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Sfizioso Player (VST3 / AU / Standalone)
        run: cmake --build build --config Release

      - name: Package macOS artifacts
        run: |
          mkdir -p artifacts/macos
          tar -czf artifacts/macos/sfizioso-player-macos.tar.gz \
            -C "build/SfiziosoPlayer_artefacts/Release" \
            "Standalone/Sfizioso Player.app" \
            "AU/Sfizioso Player.component" \
            "VST3/Sfizioso Player.vst3"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sfizioso-player-macos
          if-no-files-found: error
          path: artifacts/macos/sfizioso-player-macos.tar.gz

  windows:
    name: build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install WebView2 SDK
        shell: pwsh
        run: >
          nuget install Microsoft.Web.WebView2
          -Version 1.0.3485.44
          -OutputDirectory "$env:RUNNER_TEMP\webview2"
          -NonInteractive
          -Source https://api.nuget.org/v3/index.json

      - name: Configure and build Sfizioso Player (VST3 / Standalone)
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_PATH=%%i"
          if "%VS_PATH%"=="" exit /b 1
          call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DJUCE_WEBVIEW2_PACKAGE_LOCATION="%RUNNER_TEMP%\webview2"
          cmake --build build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sfizioso-player-windows
          if-no-files-found: warn
          path: |
            build/SfiziosoPlayer_artefacts/Release/VST3/Sfizioso Player.vst3
            build/SfiziosoPlayer_artefacts/Release/Standalone/Sfizioso Player.exe
