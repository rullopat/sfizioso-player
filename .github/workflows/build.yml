name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: brew install ninja

      # macos-14 runners ship Node; pin it for the WebView UI build (Vite).
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Sfizioso Player (VST3 / AU / Standalone)
        run: cmake --build build --config Release

  windows:
    name: build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install WebView2 SDK
        shell: pwsh
        run: >
          nuget install Microsoft.Web.WebView2
          -Version 1.0.3485.44
          -OutputDirectory "$env:RUNNER_TEMP\webview2"
          -NonInteractive
          -Source https://api.nuget.org/v3/index.json

      - name: Configure
        shell: pwsh
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DJUCE_WEBVIEW2_PACKAGE_LOCATION="$env:RUNNER_TEMP\webview2"

      - name: Build Sfizioso Player (VST3 / Standalone)
        run: cmake --build build --config Release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfizioso-player-windows
          if-no-files-found: warn
          path: |
            build/SfiziosoPlayer_artefacts/Release/VST3/Sfizioso Player.vst3
            build/SfiziosoPlayer_artefacts/Release/Standalone/Sfizioso Player.exe
